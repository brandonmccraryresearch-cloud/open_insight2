<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Central nucleus -->
  <circle cx="128" cy="128" r="18" fill="white" opacity="0.95"/>
  <circle cx="128" cy="128" r="11" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- Electron orbit 1 -->
  <ellipse cx="128" cy="128" rx="80" ry="30" transform="rotate(-30 128 128)" stroke="white" stroke-width="4.5" opacity="0.8" fill="none"/>
  <!-- Electron orbit 2 -->
  <ellipse cx="128" cy="128" rx="80" ry="30" transform="rotate(30 128 128)" stroke="white" stroke-width="4.5" opacity="0.8" fill="none"/>
  <!-- Electron orbit 3 -->
  <ellipse cx="128" cy="128" rx="80" ry="30" transform="rotate(90 128 128)" stroke="white" stroke-width="4.5" opacity="0.8" fill="none"/>
  <!-- Neural nodes on orbits -->
  <circle cx="128" cy="48" r="10" fill="white" opacity="0.9"/>
  <circle cx="128" cy="208" r="10" fill="white" opacity="0.9"/>
  <circle cx="62" cy="90" r="8" fill="white" opacity="0.8"/>
  <circle cx="194" cy="90" r="8" fill="white" opacity="0.8"/>
  <circle cx="68" cy="172" r="8" fill="white" opacity="0.8"/>
  <circle cx="188" cy="172" r="8" fill="white" opacity="0.8"/>
  <!-- Neural connections -->
  <line x1="128" y1="48" x2="68" y2="172" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="128" y1="48" x2="188" y2="172" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="62" y1="90" x2="188" y2="172" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="194" y1="90" x2="68" y2="172" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="62" y1="90" x2="128" y2="208" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="194" y1="90" x2="128" y2="208" stroke="white" stroke-width="1.5" opacity="0.3"/>
</svg>
